<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>รายละเอียดผลงาน</title>
<link rel="stylesheet" href="css/style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
<header>
  <div class="nav-wrap">
    <div class="logo">MyPortfolio</div>
    <nav>
      <ul>
        <li><a href="index.html">หน้าแรก</a></li>
        <li><a href="about.html">เกี่ยวกับฉัน</a></li>
        <li><a href="cv.html">CV</a></li>
        <li><a href="portfolio.html" class="active">ผลงาน</a></li>
        <li><a href="gallery.html">รูปภาพ</a></li>
        <li><a href="contact.html">ติดต่อ</a></li>
        <li><a href="settings.html">⚙️ ตั้งค่า</a></li>
      </ul>
    </nav>
  </div>
</header>

<section>
  <div class="container">
    <div id="detail-content" class="card" style="max-width:700px;margin:0 auto;">
      <p>กำลังโหลดข้อมูล...</p>
    </div>
  </div>
</section>

<footer><p>&copy; 2026 MyPortfolio by Black_BARA. All rights reserved.</p></footer>

<script src="js/portfolio-data.js"></script>
<script src="js/main.js"></script>
<script>
  // ปรับฟังก์ชันเป็น async เพื่อรองรับการ fetch ข้อมูลไฟล์ภายนอก (.md)
  async function loadDetail() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const container = document.getElementById("detail-content");
    const hw = HOMEWORK_DATA[id]; // ดึงข้อมูลจาก portfolio-data.js

    if (!hw) {
      container.innerHTML = `
        <h2>ไม่พบข้อมูลผลงานนี้</h2>
        <p>กรุณากลับไปเลือกผลงานจากหน้ารายการอีกครั้ง</p>
        <a href="portfolio.html" class="btn" style="margin-top:20px;">กลับไปหน้าผลงาน</a>
      `;
      return;
    }

    // จัดการแสดงผลส่วนรายละเอียด และปุ่มกลับ
    const detailListHtml = hw.details && hw.details.length
      ? `<ul style="margin:16px 0 16px 20px; line-height:1.9;">
           ${hw.details.map(d => `<li>${d}</li>`).join("")}
         </ul>`
      : "";

    container.innerHTML = `
      <h2 style="margin-bottom:16px;">${hw.title}</h2>
      <div id="media-container" class="image-gallery">
         <p>กำลังโหลดเนื้อหา...</p>
      </div>
      <p style="margin-top:16px;"><strong>รายละเอียด:</strong> ${hw.description}</p>
      ${detailListHtml}
      <div style="display:flex; gap:12px; margin-top:20px; flex-wrap:wrap;">
        <a href="${hw.download || '#'}" class="btn" download>Download</a>
        <a href="portfolio.html" class="btn">กลับไปหน้าผลงาน</a>
      </div>
    `;

    document.title = hw.title + " | MyPortfolio";

    const mediaContainer = document.getElementById("media-container");
    const filePath = Array.isArray(hw.image) ? hw.image[0] : hw.image;

    if (filePath) {
      const lowerPath = filePath.toLowerCase();

      // Case 1: หากเป็นไฟล์ PDF (.pdf)
      if (lowerPath.endsWith(".pdf")) {
        mediaContainer.outerHTML = `
          <div style="margin-top: 20px; border: 1px solid #ccc; border-radius: 8px; overflow: hidden;">
            <iframe src="${filePath}" width="100%" height="600px" style="border: none;">
              <p>บราวเซอร์ของคุณไม่รองรับการแสดงผล PDF <a href="${filePath}">คลิกที่นี่เพื่อดาวน์โหลดไฟล์</a></p>
            </iframe>
          </div>
        `;
      } 
      // Case 2: หากเป็นไฟล์ Markdown (.md)
      else if (lowerPath.endsWith(".md")) {
        try {
          // ใช้ window.fetch เพื่อเลี่ยงขีดแดงใน VS Code
          const response = await window.fetch(filePath);
          if (!response.ok) throw new Error("ไม่สามารถอ่านไฟล์ได้");
          
          const markdownText = await response.text();
          const htmlContent = marked.parse(markdownText);
          
          mediaContainer.outerHTML = `<div class="markdown-content">${htmlContent}</div>`;
        } catch (error) {
          console.error(error);
          mediaContainer.innerHTML = `<p style="color:red;">❌ ไม่สามารถโหลดเนื้อหาจากไฟล์ Markdown ได้ (${filePath})</p>`;
        }
      } 
      // Case 3: หากเป็นรูปภาพปกติ (PNG, JPG, JPEG, GIF, WEBP)
      else {
        mediaContainer.innerHTML = Array.isArray(hw.image) 
          ? hw.image.map(img => `<img src="${img}" alt="${hw.title}">`).join("") 
          : `<img src="${hw.image}" alt="${hw.title}">`;
      }
    }
  }

  document.addEventListener("DOMContentLoaded", loadDetail);
</script>
</body>
</html>
